<!DOCTYPE html>
<html>
<head>
<title>For You 💙</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;600;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
text-align:center;
color:white;
background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #667eea);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.section{
display:none;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:18px;
margin:10px;
}

#yesBtn{
background:white;
color:#764ba2;
}

input{
padding:12px;
border-radius:25px;
border:none;
text-align:center;
outline:none;
}

#poemPage{
background: radial-gradient(circle at center,#e6c27a 0%,#c89f5b 60%,#a67c3d 100%);
color:#3e2a14;
overflow-y:auto;
}

.poem-box{
max-width:750px;
width:90%;
font-size:18px;
line-height:2;
background:rgba(255,244,214,0.95);
padding:40px;
border-radius:12px;
box-shadow: inset 0 0 25px rgba(0,0,0,0.35);
font-family:'Noto Serif Tamil', serif;
color:#3b240b;
text-align:left;
margin-bottom:60px;
white-space:pre-line;
}

/* hearts */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* fireworks */

.firework{
position:fixed;
width:6px;
height:6px;
background:#fff3d4;
border-radius:50%;
box-shadow:0 0 20px #fff3d4;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(20);opacity:0;}
}

</style>
</head>

<body>

<!-- LOCK PAGE -->
<div id="lockScreen" class="section" style="display:flex;background:#111;">
<h2>Enter Secret Code 💙</h2>
<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Unlock</button>
</div>

<!-- SECOND PAGE -->
<div id="proposalPage" class="section">
<h2>Would you like to see something? 💙</h2>
<button id="yesBtn" onclick="goToPoem()">Click Here ✨</button>
</div>

<!-- POEM PAGE -->
<div id="poemPage" class="section">

<h2 style="color:#3e2a14;">என் முதல் கவிதை உனக்காக 💛</h2>

<div class="poem-box">
<span id="typingText"></span>
</div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop preload="auto" playsinline>
<source src="mymusic1.mp3.mpeg" type="audio/mpeg">
</audio>

<script>

/* PASSWORD CHECK */

function checkPassword(){

var pass=document.getElementById("password").value;

if(pass==="RP215"){
document.getElementById("lockScreen").style.display="none";
document.getElementById("proposalPage").style.display="flex";
}
else{
alert("Wrong password 😜");
}

}

/* OPEN POEM PAGE */

function goToPoem(){

document.getElementById("proposalPage").style.display="none";
document.getElementById("poemPage").style.display="flex";

var music=document.getElementById("bgMusic");
music.volume=0.8;
music.play();

startTyping();
startFireworks();

}

/* TYPING ANIMATION */

var poem=`கொஞ்சம் பொறாமை தான்
அந்த பிரம்மன் மீது
உன்னை படைக்கும்போது
அவன் உன்னை எவ்வளவு ரசித்திருப்பான் என்று
கொஞ்சம் பொறாமை தான்

கொஞ்சம் ஆசை தான்
கண்களால் ரசித்த உன்னை
கைகளால் கட்டி அணைக்க
கொஞ்சம் ஆசை தான்

கொஞ்சம் கோபம் தான்
எட்டி பார்த்தால் தெரியும் தூரம் இருந்தும்
உன்னை காண ஒரு வருடம் காத்த வைத்த
உன்மேல் கொஞ்சம் கோபம் தான்

கொஞ்சம் விருப்பம் தான்
தினமும் உன் விழியை பார்த்து
என் பொழுதுகள் விடிய
கொஞ்சம் விருப்பம் தான்

கொஞ்சம் ஏக்கம் தான்
என் தலையணையின் மூலமாக
கிடைத்த உன் காதல்
உன்னிடமிருந்து கிடைக்க
ரொம்ப ஏக்கம் தான்`;

var i=0;

function startTyping(){

function type(){

if(i<poem.length){

document.getElementById("typingText").innerHTML+=poem.charAt(i);

i++;

setTimeout(type,40);

}

}

type();

}

/* HEARTS */

function createHeart(){

var heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💙";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

/* FIREWORKS */

function startFireworks(){

for(let i=0;i<40;i++){

var fw=document.createElement("div");

fw.classList.add("firework");

fw.style.left=Math.random()*100+"vw";

fw.style.top=Math.random()*100+"vh";

document.body.appendChild(fw);

setTimeout(()=>fw.remove(),1000);

}

}

</script>

</body>
</html>
